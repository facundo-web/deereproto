<!-- @dsCard group="Shadows" viewport="700x140" name="Shadow Scale" subtitle="--shadow-xs through --shadow-xl" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:20px 16px;background:#F8F7F5;display:flex;gap:12px;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:8px;padding:14px 12px;width:100px;text-align:center}
  .label{font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;color:#595754;letter-spacing:0.04em;text-transform:uppercase}
</style>
</head><body>
  <div class="card" style="box-shadow:var(--shadow-xs)"><div class="label">xs</div></div>
  <div class="card" style="box-shadow:var(--shadow-sm)"><div class="label">sm</div></div>
  <div class="card" style="box-shadow:var(--shadow-md)"><div class="label">md</div></div>
  <div class="card" style="box-shadow:var(--shadow-lg)"><div class="label">lg</div></div>
  <div class="card" style="box-shadow:var(--shadow-xl)"><div class="label">xl</div></div>
</body></html>
