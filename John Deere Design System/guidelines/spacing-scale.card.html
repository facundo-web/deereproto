<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px grid — --space-1 through --space-16" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:16px 20px;background:#fff;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:12px}
  .bar{background:#367C2B;border-radius:2px;height:20px;flex-shrink:0}
  .tok{font-family:'JetBrains Mono',monospace;font-size:11px;color:#9A9897;width:56px}
  .val{font-family:'JetBrains Mono',monospace;font-size:11px;color:#C4C3C1;width:36px}
</style>
</head><body>
  <div class="row"><div class="bar" style="width:4px"></div><div class="tok">space-1</div><div class="val">4px</div></div>
  <div class="row"><div class="bar" style="width:8px"></div><div class="tok">space-2</div><div class="val">8px</div></div>
  <div class="row"><div class="bar" style="width:12px"></div><div class="tok">space-3</div><div class="val">12px</div></div>
  <div class="row"><div class="bar" style="width:16px"></div><div class="tok">space-4</div><div class="val">16px</div></div>
  <div class="row"><div class="bar" style="width:24px;background:#4E9B3E"></div><div class="tok">space-6</div><div class="val">24px</div></div>
  <div class="row"><div class="bar" style="width:32px;background:#6BB858"></div><div class="tok">space-8</div><div class="val">32px</div></div>
  <div class="row"><div class="bar" style="width:48px;background:#A3D698"></div><div class="tok">space-12</div><div class="val">48px</div></div>
  <div class="row"><div class="bar" style="width:64px;background:#D1EBCA"></div><div class="tok">space-16</div><div class="val">64px</div></div>
</body></html>
