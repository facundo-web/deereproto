<!-- @dsCard group="Colors" viewport="700x110" name="Green Scale" subtitle="--jd-green-50 through --jd-green-900" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:16px 16px 8px;font-family:'Barlow',sans-serif;background:#fff}
  .row{display:flex;gap:4px}
  .sw{flex:1;border-radius:4px;overflow:hidden}
  .chip{height:44px}
  .tok{font-size:9px;color:#767471;margin-top:4px;text-align:center;font-family:'JetBrains Mono',monospace}
</style>
</head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--jd-green-50);border:1px solid #DEDEDC"></div><div class="tok">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-100);border:1px solid #DEDEDC"></div><div class="tok">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-200)"></div><div class="tok">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-300)"></div><div class="tok">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-400)"></div><div class="tok">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-500)"></div><div class="tok">500</div></div>
    <div class="sw" style="position:relative"><div class="chip" style="background:var(--jd-green-600)"></div><div class="tok" style="color:#367C2B;font-weight:700">600 ★</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-700)"></div><div class="tok">700</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-800)"></div><div class="tok">800</div></div>
    <div class="sw"><div class="chip" style="background:var(--jd-green-900)"></div><div class="tok">900</div></div>
  </div>
</body></html>
