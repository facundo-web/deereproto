<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="Three lockup variants — badge, horizontal, color-bar" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:16px;font-family:'Barlow',sans-serif;background:#F8F7F5;display:flex;gap:12px;align-items:stretch}
  .panel{flex:1;border-radius:8px;padding:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
  .label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;opacity:0.5;margin-top:4px}
  img{max-width:100%;max-height:60px;object-fit:contain}
</style>
</head><body>
  <div class="panel" style="background:#fff;border:1px solid #DEDEDC">
    <img src="../assets/logo/jd-horizontal.png" alt="JD Horizontal Lockup">
    <div class="label" style="color:#27251F">On White</div>
  </div>
  <div class="panel" style="background:#367C2B">
    <img src="../assets/logo/jd-badge.png" alt="JD Badge" style="max-height:80px">
    <div class="label" style="color:#fff">On Green</div>
  </div>
  <div class="panel" style="background:#27251F">
    <img src="../assets/logo/jd-horizontal.png" alt="JD Horizontal Lockup">
    <div class="label" style="color:#fff">On Dark</div>
  </div>
</body></html>
