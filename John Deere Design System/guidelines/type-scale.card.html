<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="--text-xs through --text-5xl" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:16px 20px;background:#fff;display:flex;flex-direction:column;gap:0}
  .row{display:flex;align-items:baseline;gap:12px;padding:4px 0;border-bottom:1px solid #F8F7F5}
  .sample{font-family:var(--font-body);color:#27251F;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .tok{font-family:'JetBrains Mono',monospace;font-size:10px;color:#9A9897;width:56px;flex-shrink:0;text-align:right}
  .val{font-family:'JetBrains Mono',monospace;font-size:10px;color:#C4C3C1;width:32px;flex-shrink:0;text-align:right}
</style>
</head><body>
  <div class="row"><div class="sample" style="font-size:var(--text-xs)">Field status label</div><div class="tok">xs</div><div class="val">12</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-sm)">Equipment connected</div><div class="tok">sm</div><div class="val">14</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-base)">North Field · 320.4 acres</div><div class="tok">base</div><div class="val">16</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-lg)">Spring 2026 planting season</div><div class="tok">lg</div><div class="val">18</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-xl)">Miller Family Farms</div><div class="tok">xl</div><div class="val">20</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-2xl);font-weight:600">Operations Center</div><div class="tok">2xl</div><div class="val">24</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-3xl);font-weight:700">1,116 ac</div><div class="tok">3xl</div><div class="val">30</div></div>
  <div class="row"><div class="sample" style="font-size:var(--text-4xl);font-weight:700;font-family:var(--font-display)">48%</div><div class="tok">4xl</div><div class="val">36</div></div>
</body></html>
