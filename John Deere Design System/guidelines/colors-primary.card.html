<!-- @dsCard group="Colors" viewport="700x140" name="Brand Colors" subtitle="JD Green · JD Yellow · JD Black" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:16px;font-family:'Barlow',sans-serif;background:#fff;display:flex;gap:10px}
  .sw{flex:1;border-radius:6px;overflow:hidden;border:1px solid #DEDEDC}
  .chip{height:64px}
  .info{padding:8px 12px}
  .name{font-size:12px;font-weight:600;color:#27251F}
  .hex{font-family:'JetBrains Mono',monospace;font-size:11px;color:#767471;margin-top:2px}
  .use{font-size:10px;color:#9A9897;margin-top:3px;line-height:1.4}
</style>
</head><body>
  <div class="sw"><div class="chip" style="background:#367C2B"></div><div class="info"><div class="name">JD Green</div><div class="hex">#367C2B</div><div class="use">Primary · Buttons · Active states · Headers</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFDE00;border-bottom:1px solid #DEDEDC"></div><div class="info"><div class="name">JD Yellow</div><div class="hex">#FFDE00</div><div class="use">Accent · Deer mark · Warnings · Highlights</div></div></div>
  <div class="sw"><div class="chip" style="background:#27251F"></div><div class="info"><div class="name">JD Black</div><div class="hex">#27251F</div><div class="use">Primary text · Sidebar bg · Heavy chrome</div></div></div>
</body></html>
