<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:20px 24px;background:#fff}
  .hero{font-family:var(--font-display);font-weight:800;font-size:48px;line-height:1.1;letter-spacing:-0.01em;color:#27251F;text-transform:uppercase}
  .hero span{color:#367C2B}
  .sub{font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1.2;letter-spacing:0.01em;color:#595754;text-transform:uppercase;margin-top:6px}
  .meta{font-family:'Barlow',sans-serif;font-size:11px;color:#9A9897;letter-spacing:0.06em;text-transform:uppercase;margin-top:10px}
</style>
</head><body>
  <div class="hero">Built for the way <span>you</span> farm.</div>
  <div class="sub">Since 1837 · 160+ Countries</div>
  <div class="meta">Barlow Condensed · 800 ExtraBold · All Caps · JD Display</div>
</body></html>
