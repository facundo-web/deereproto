<!-- @dsCard group="Colors" viewport="700x110" name="Neutral Scale" subtitle="--neutral-0 through --neutral-900 (warm gray)" -->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:16px 16px 8px;font-family:'Barlow',sans-serif;background:#F8F7F5}
  .row{display:flex;gap:4px}
  .sw{flex:1;border-radius:4px;overflow:hidden}
  .chip{height:44px}
  .tok{font-size:9px;color:#767471;margin-top:4px;text-align:center;font-family:'JetBrains Mono',monospace}
</style>
</head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFFFFF;border:1px solid #DEDEDC"></div><div class="tok">0</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-50);border:1px solid #DEDEDC"></div><div class="tok">50</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-100);border:1px solid #DEDEDC"></div><div class="tok">100</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><div class="tok">200</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-300)"></div><div class="tok">300</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><div class="tok">400</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-500)"></div><div class="tok">500</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-600)"></div><div class="tok">600</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-700)"></div><div class="tok">700</div></div>
    <div class="sw" style="position:relative"><div class="chip" style="background:var(--neutral-800)"></div><div class="tok" style="font-weight:700;color:#27251F">800 ★</div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-900)"></div><div class="tok">900</div></div>
  </div>
</body></html>
