<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{padding:20px;font-family:'Barlow',sans-serif;background:#F8F7F5}
  .sec{margin-bottom:18px}
  .lbl{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#9A9897;margin-bottom:8px}
  .row{display:flex;align-items:center;flex-wrap:wrap;gap:16px}
</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { DataTable, StatusIndicator, Badge } = window.JohnDeereDesignSystem_387495;
const COLS = [
  { key:'name',  label:'Field' },
  { key:'crop',  label:'Crop' },
  { key:'acres', label:'Acres', align:'right' },
  { key:'status',label:'Status', sortable:false, render:(v)=><StatusIndicator status={v} size="sm" /> },
];
const ROWS = [
  { id:1, name:'North Field',  crop:'Corn',         acres:320.4, status:'planting' },
  { id:2, name:'South Field',  crop:'Soybeans',     acres:278.7, status:'spraying' },
  { id:3, name:'East Quarter', crop:'Corn',         acres:162.3, status:'planned'  },
  { id:4, name:'River Bottom', crop:'Soybeans',     acres:214.5, status:'complete' },
  { id:5, name:'Upper Pasture',crop:'Winter Wheat', acres:140.8, status:'growing'  },
];
function Demo() {
  return (
    <div>
      <div className="sec">
        <div className="lbl">StatusIndicator</div>
        <div className="row">
          <StatusIndicator status="active" />
          <StatusIndicator status="planting" />
          <StatusIndicator status="idle" />
          <StatusIndicator status="stored" />
          <StatusIndicator status="connected" />
          <StatusIndicator status="error" />
          <StatusIndicator status="complete" />
          <StatusIndicator status="planned" />
          <StatusIndicator status="growing" size="sm" />
        </div>
      </div>
      <div className="sec">
        <div className="lbl">DataTable</div>
        <DataTable columns={COLS} rows={ROWS} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
