<div id="root"></div>
<script type="text/babel">
const { Tabs, Breadcrumb } = window.JohnDeereDesignSystem_387495;
const TABS = [{id:'overview',label:'Overview'},{id:'operations',label:'Operations',count:3},{id:'equipment',label:'Equipment'},{id:'notes',label:'Notes'}];
const TABS2 = [{id:'fields',label:'Fields'},{id:'map',label:'Map View'},{id:'history',label:'History'}];
function Demo() {
  const [tab1, setTab1] = React.useState('overview');
  const [tab2, setTab2] = React.useState('fields');
  const bc = [{label:'Operations Center',href:'#'},{label:'Fields',href:'#'},{label:'North Field'}];
  return (
    <div>
      <div className="sec">
        <div className="lbl">Tabs — Line</div>
        <Tabs tabs={TABS} activeTab={tab1} onChange={setTab1} />
      </div>
      <div className="sec">
        <div className="lbl">Tabs — Pill</div>
        <Tabs tabs={TABS2} activeTab={tab2} onChange={setTab2} variant="pill" />
      </div>
      <div className="sec">
        <div className="lbl">Breadcrumb</div>
        <Breadcrumb items={bc} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
