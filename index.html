    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    @keyframes slidein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

    .jd-btn:hover{background:var(--jd-green-700)}
    .jd-btn:active{transform:scale(.98)}
    .jd-btn-ghost{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--neutral-700);border:1px solid var(--border-subtle);border-radius:6px;padding:7px 14px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 150ms ease-out}
    .jd-btn-ghost:hover{border-color:var(--jd-green-600);color:var(--jd-green-700);background:var(--jd-green-50)}
    .jd-btn-ghost:active{transform:scale(.98)}

    /* ── Navbar responsive ── */
    .tab-btn{color:#fff;border:none;border-bottom:2px solid transparent;background:transparent;padding:18px 14px 15px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;transition:all 150ms;letter-spacing:.01em;flex-shrink:0}
    .tab-btn:hover{background:rgba(255,255,255,.08)}
    .tab-btn.on{font-weight:700;border-bottom-color:var(--jd-yellow-400);background:rgba(255,255,255,.12)}
    /* At 1200px: shrink slightly but keep labels */
    @media(max-width:1200px){
      .tab-btn{padding:18px 10px 15px;font-size:12px;gap:5px}
      .nav-vez{display:none!important}
    }
    /* At 1000px: also shrink but still show icons+labels */
    @media(max-width:1000px){
      .tab-btn{padding:16px 8px 13px;font-size:11px;gap:4px}
    }
    /* At 900px: hide labels, icon-only tabs */
    @media(max-width:900px){
      .tab-label{display:none}
      .tab-btn{padding:16px 10px 13px;gap:0}
    }
    @media(max-width:850px){
      .tab-btn{padding:14px 8px 11px}
      .header-logo-text{display:none}
    }

    .nav-item:hover{background:#F0EFED;color:var(--neutral-800)}
    .nav-item.on{background:var(--jd-green-50);color:var(--jd-green-700);border-left-color:var(--jd-green-600);font-weight:700}
    .opt-btn:hover{background:var(--jd-green-50)!important;border-color:var(--jd-green-600)!important}
    .row-hover:hover{background:#EDF7EA}

    .kpi-grid{display:grid;gap:12px;grid-template-columns:repeat(4,1fr)}
    @media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.kpi-grid{grid-template-columns:1fr}}

    .dealer-panel{display:flex;gap:14px;flex:1;min-height:0;overflow:hidden}
    .dealer-panel-main{flex:1 1 420px;min-width:300px;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;min-height:0}

      .dealer-panel-side{flex:none;width:100%;min-width:0;overflow-y:visible;max-height:none}

    .field-panel{display:flex;gap:14px;flex:1;min-height:0;overflow:hidden}
    .field-panel-side{flex:0 0 340px;min-width:280px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-right:4px;padding-bottom:24px;overscroll-behavior:contain}
    .field-panel-main{flex:1 1 380px;min-width:300px;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;min-height:0}
    @media(max-width:900px){
      .field-panel{flex-direction:column;height:auto}
      .field-panel-side{flex:none;width:100%;min-width:0;overflow-y:visible}

    .fluxo-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--header-h) - var(--subtitle-h) - 60px);min-height:500px}
    .fluxo-map-area{flex:0 0 58%;overflow:hidden;display:flex;flex-direction:column}

    @media(max-height:700px){.fluxo-wrap{height:auto;min-height:auto}.fluxo-map-area{flex:none}}

    .step-done{border-color:var(--jd-green-600)!important;background:var(--jd-green-50)!important}
    .step-current{border-color:var(--jd-green-600)!important;background:var(--jd-green-50)!important;animation:pulse-ring 2s ease-out infinite}
    .step-future{opacity:.3}

    .demo-step-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:20px;background:var(--jd-green-600);color:#fff;font-size:11px;font-weight:800;flex-shrink:0}

    .action-btn{text-align:left;background:#fff;border:1.5px solid var(--jd-green-600);color:var(--jd-green-700);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:all 150ms;width:100%;font-family:'Barlow',sans-serif}

    .coll-scroll::-webkit-scrollbar{width:3px}
    .coll-scroll::-webkit-scrollbar-thumb{background:var(--neutral-300);border-radius:3px}
    /* Tight sidebar layout */
    @media(max-width:1280px){.dealer-panel-side{flex:0 0 310px!important}.field-panel-side{flex:0 0 295px!important}}

function LI({ name, size=16, style:st, className }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    const fn = lucide[key] || lucide.Circle;
    ref.current.innerHTML = '';
    const svg = lucide.createElement(fn);
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke-width', '2'); svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    ref.current.appendChild(svg);
  }, [name, size]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',flexShrink:0,...st}} className={className}/>;
}

/* ─── UI Helpers ──────────────────────────────────────── */
function Pill({children,bg,fg,size}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:bg,color:fg,fontSize:size||11,fontWeight:600,padding:'2px 8px',borderRadius:4,whiteSpace:'nowrap'}}>{children}</span>;
}
function statusOf(flags,step){
  if(flags.resolved)return{t:'RESOLVIDO',bg:C.okBg,fg:C.ok};
  if(step==='sPausa')return{t:'PAUSADO',bg:C.critBg,fg:C.crit};
  if(step==='s0')return{t:'AGUARDANDO',bg:C.line2,fg:C.ink3};
  return{t:'EM ANDAMENTO',bg:C.warnBg,fg:C.warn};
}
function ecOf(e){
  if(/resolv|referên/i.test(e))return{bg:C.okBg,fg:C.ok};
  if(/risco|parado|atras|nunca/i.test(e))return{bg:C.critBg,fg:C.crit};
  if(/fila|andamento/i.test(e))return{bg:C.warnBg,fg:C.warn};
  return{bg:C.line2,fg:C.ink2};
}
function Bar({v,c}){
  return <div style={{display:'flex',alignItems:'center',gap:8}}>

}

/* ─── Case Timeline ───────────────────────────────────── */
const CASE_TL=[
  {time:'08:11',who:'produtor',label:'Produtor inicia contato',     detail:'AutoTrac não engata na X9'},
  {time:'08:12',who:'bot',     label:'Triagem automática',           detail:'Ramo 2 · Sinal · prioridade Alta · #BR-4471'},
  {time:'08:17',who:'csc',     label:'CSC assumiu o caso',           detail:'Carlos verificou telemetria'},
  {time:'08:22',who:'csc',     label:'Diagnóstico: sinal StarFire 2/5',detail:'Proposta de visita enviada'},
  {time:'08:26',who:'produtor',label:'Visita confirmada',            detail:'Amanhã 9h · talhão norte'},
  {time:'10:48',who:'field',   label:'Field Trainer recalibrou',     detail:'Antena reposicionada · AutoTrac 100% ✅'},
  {time:'11:00',who:'csc',     label:'Fechamento do caso',           detail:'CSAT coletado · caso encerrado'},
  {time:'D+7',  who:'bot',     label:'Follow-up de adoção',          detail:'Confirmar uso do AutoTrac e AutoPath'},
];
function CaseTimeline({flags,step}){
  const resolved=!!flags.resolved;
  const fieldDone=['sResolvido','sCsat','sFim','sFimRuim'].includes(step)||flags.resolved==='campo';
  // Which steps are done depends on the actual chosen branch
  const isRemoto=flags.resolved==='remoto';
  const isCampo=flags.resolved==='campo';
  const visitaConfirmada=flags.agenda!=null||isCampo;
  const caseOpen=['sMaq','s2','sHum','sRemoto','sInfo','sSoft','sAdmin'].includes(step)||chat.customer.some(m=>m.k==='milestone');
  const cscJoined=['sHum','sRemoto','sInfo','sAgenda','sConfirmado','sCaminho','sEmCampo','sResolvido'].includes(step);
  const diagDone=['sRemoto','sAgenda','sConfirmado','sCaminho','sEmCampo','sResolvido'].includes(step)||(isRemoto||isCampo);
  const items=CASE_TL.map((it,i)=>{
    let done=false;
    if(i===0) done=caseOpen;                              // Produtor inicia
    if(i===1) done=caseOpen;                              // Triagem automática
    if(i===2) done=cscJoined;                             // CSC entrou
    if(i===3) done=diagDone;                              // Diagnóstico
    if(i===4) done=visitaConfirmada;                      // Visita confirmada — ONLY if agenda was set
    if(i===5) done=fieldDone;                             // Field recalibrou
    if(i===6) done=['sCsat','sFim','sFimRuim'].includes(step)||resolved; // Fechamento
    if(i===7) done=flags.csat!=null;                      // Follow-up D+7
    return{...it,done,
      // For remote path, show alternative label at step 4
      label: i===4&&isRemoto?'Resolvido remotamente (sem visita)':
             i===4&&!visitaConfirmada?'Visita confirmada (não agendado)':it.label,
      detail: i===4&&isRemoto?'Guia de reposicionamento funcionou ✅':
              i===4&&!visitaConfirmada?'Aguardando decisão do produtor':it.detail,
    };
  });
  const curIdx=items.reduce((a,it,i)=>it.done?i:a,-1);
  return(
    <div style={{padding:'8px 14px 4px'}}>
      {items.map((it,i)=>{
        const isCur=i===curIdx+1&&!it.done;
        return(
          <div key={i} style={{display:'flex',gap:10,paddingBottom:i<items.length-1?10:4,position:'relative'}}>
            {i<items.length-1&&<div style={{position:'absolute',left:9,top:20,width:2,height:'calc(100% - 4px)',background:it.done?C.green:C.line2}}/>}
            <div style={{width:20,height:20,borderRadius:20,background:it.done?C.green:isCur?C.warnBg:C.line2,border:'2px solid '+(it.done?C.green:isCur?C.warn:C.line),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,zIndex:1,transition:'all 300ms'}}>
              {it.done&&<Check size={10} style={{color:'#fff'}}/>}
              {isCur&&<span style={{width:6,height:6,borderRadius:6,background:C.warn,display:'block'}}/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:1}}>
                <span style={{fontSize:11.5,fontWeight:600,color:it.done?C.ink:isCur?C.warn:C.ink3}}>{it.label}</span>
                {isCur&&<Pill bg={C.warnBg} fg={C.warn}>atual</Pill>}
              </div>
              <div style={{fontSize:10.5,color:C.ink3,lineHeight:1.4}}>{it.detail}</div>
              <div style={{fontSize:10,color:C.ink4,marginTop:1}}>{it.time}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function getNodeCenter(n){ return { x: n.x + n.w/2, y: n.y + n.h/2 }; }
function getNodePort(n, side){
  if(side==='bottom') return {x: n.x+n.w/2, y: n.y+n.h};
  if(side==='top')    return {x: n.x+n.w/2, y: n.y};
  if(side==='right')  return {x: n.x+n.w,   y: n.y+n.h/2};
  if(side==='left')   return {x: n.x,        y: n.y+n.h/2};
}

function edgePath(src,tgt,fromSide,toSide){
  const a=getNodePort(src,fromSide), b=getNodePort(tgt,toSide);
  const dx=b.x-a.x, dy=b.y-a.y;
  if(fromSide==='bottom'&&toSide==='top'){
    const cy=Math.abs(dy)*0.45;
    return 'M'+a.x+','+a.y+' C'+a.x+','+(a.y+cy)+' '+b.x+','+(b.y-cy)+' '+b.x+','+b.y;
  }
  if(fromSide==='right'&&toSide==='top'){
    return 'M'+a.x+','+a.y+' C'+(a.x+60)+','+a.y+' '+b.x+','+(b.y-40)+' '+b.x+','+b.y;
  }
  if(fromSide==='right'&&toSide==='left'){
    const mx=(a.x+b.x)/2;
    return 'M'+a.x+','+a.y+' C'+mx+','+a.y+' '+mx+','+b.y+' '+b.x+','+b.y;
  }
  if(fromSide==='left'&&toSide==='left'){
    const lx=Math.min(a.x,b.x)-40;
    return 'M'+a.x+','+a.y+' C'+lx+','+a.y+' '+lx+','+b.y+' '+b.x+','+b.y;
  }
  if(fromSide==='bottom'&&toSide==='left'){
    return 'M'+a.x+','+a.y+' C'+a.x+','+(a.y+40)+' '+(b.x-40)+','+b.y+' '+b.x+','+b.y;
  }
  if(fromSide==='right'&&toSide==='bottom'){
    return 'M'+a.x+','+a.y+' C'+(a.x+40)+','+a.y+' '+b.x+','+(b.y-40)+' '+b.x+','+b.y;
  }
  // default: cubic
  return 'M'+a.x+','+a.y+' C'+(a.x+dx*0.4)+','+(a.y+dy*0.1)+' '+(b.x-dx*0.4)+','+(b.y-dy*0.1)+' '+b.x+','+b.y;
}

/* ── Determine edge ports ── */
function getEdgePorts(f,t,type){
  const fNode=GNODES.find(n=>n.id===f);
  const tNode=GNODES.find(n=>n.id===t);
  if(!fNode||!tNode) return ['bottom','top'];

  // branches go right→left
  if(['b1a','b1b','b2a','b2b','b4a','b4b','b5a','b5b','b10a','b10b'].includes(t)) return['right','left'];
  // errors on the left
  if(['errA','errB','errC'].includes(f)) return['right','left'];
  // loop arc
  if(type==='loop') return['right','top'];
  // exits at bottom
  if(t.startsWith('ex')) return['bottom','top'];
  // entry to h0
  if(f.startsWith('ent')) return['bottom','top'];
  // default happy path
  if(fNode.y < tNode.y) return['bottom','top'];
  if(fNode.y > tNode.y) return['top','bottom'];
  return['right','left'];
}

              <marker id="arE"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M1,2 L8,5 L1,8" fill="none" stroke="#F59E0B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </marker>
              <marker id="arL"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M1,2 L8,5 L1,8" fill="none" stroke="#EA580C" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </marker>
              <marker id="arX"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M1,2 L8,5 L1,8" fill="none" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              </marker>
            </defs>

            {paths.map(p=>{
              if(p.hide) return null;
              const markerMap={happy:'url(#arH)',proat:'url(#arH)',alt:'url(#arA)',error:'url(#arE)',loop:'url(#arL)',exit_ok:'url(#arH)',exit_ko:'url(#arE)',exit_x:'url(#arX)'};
              const mid=edgeMid(p);
              return(
                <g key={p.idx}>
                  <path d={p.d} fill="none"
                    stroke={p.col} strokeWidth={p.type==='happy'||p.type==='proat'?2.5:1.5}
                    strokeDasharray={p.dash==='none'?undefined:p.dash}
                    markerEnd={markerMap[p.type]||'url(#arA)'}
                    opacity={p.hide?0:1}
                    style={{transition:'opacity 200ms'}}
                  />
                  {p.label&&(
                    <g>
                      <rect x={mid.x-p.label.length*2.8} y={mid.y-9} width={p.label.length*5.6} height="14" rx="3" fill="white" opacity=".88"/>
                      <text x={mid.x} y={mid.y+1} fontSize="8.5" fill={p.col} textAnchor="middle" fontWeight="600">{p.label}</text>
                    </g>
                  )}
                </g>
              );
            })}

            {/* ── Nodes ── */}
            {GNODES.map(n=>{
              const col=NODE_COLORS[n.type]||NODE_COLORS.alt;
              const isSel=selNode===n.id;
              const actor=n.actor?ACTOR_CONF[n.actor]:null;
              const isDecision=n.type==='decision';
              return(
                <g key={n.id} onClick={()=>setSelNode(selNode===n.id?null:n.id)}
                  style={{cursor:'pointer',transition:'all 150ms'}}>
                  {/* Shadow if selected */}
                  {isSel&&<rect x={n.x-3} y={n.y-3} width={n.w+6} height={n.h+6} rx="10" fill={col.stroke} opacity=".18"/>}
                  {/* Node body */}
                  <rect x={n.x} y={n.y} width={n.w} height={n.h} rx={isDecision?12:8}
                    fill={isSel?col.stroke+'22':col.fill}
                    stroke={isSel?col.stroke:col.stroke}
                    strokeWidth={isSel?2.5:n.hi?2:1.5}
                    strokeDasharray={n.type==='alt'?'4,2':undefined}
                  />
                  {/* Diamond marker for decision nodes */}
                  {isDecision&&<polygon
                    points={(n.x+n.w/2)+','+(n.y-8)+' '+(n.x+n.w/2+8)+','+n.y+' '+(n.x+n.w/2)+','+(n.y+8)+' '+(n.x+n.w/2-8)+','+n.y}
                    fill={col.stroke} opacity="0"
                  />}
                  {/* MAIOR CONVERSÃO badge */}
                  {n.hi&&<g>
                    <rect x={n.x+n.w-68} y={n.y-10} width="72" height="14" rx="7" fill="#15803D"/>
                    <text x={n.x+n.w-32} y={n.y-1} fontSize="7.5" fontWeight="800" fill="white" textAnchor="middle">MAIOR CONVERSÃO</text>
                  </g>}
                  {/* Actor badge */}
                  {actor&&<g>
                    <circle cx={n.x+14} cy={n.y+14} r="10" fill={actor.color+'22'} stroke={actor.color} strokeWidth="1"/>
                    <text x={n.x+14} y={n.y+18} fontSize="9" textAnchor="middle">{actor.emoji}</text>
                  </g>}
                  {/* Icon */}
                  {!actor&&n.icon&&<text x={n.x+10} y={n.y+n.h/2+4} fontSize="13" textAnchor="middle">{n.icon}</text>}
                  {/* Decision rhombus indicator */}
                  {isDecision&&<g>
                    <rect x={n.x+n.w-22} y={n.y+6} width="18" height="18" rx="4" fill={col.stroke+'22'}/>
                    <text x={n.x+n.w-13} y={n.y+19} fontSize="10" textAnchor="middle" fill={col.stroke}>⋱</text>
                  </g>}
                  {/* Label */}
                  <text x={actor?n.x+28:n.x+24} y={n.y+n.h/2-4} fontSize="11.5" fontWeight="700" fill={col.text}>
                    {n.label}
                  </text>
                  {/* Sub */}
                  <text x={actor?n.x+28:n.x+24} y={n.y+n.h/2+10} fontSize="9.5" fill={col.text+'99'}>
                    {n.sub}
                  </text>
                  {/* Time badge */}
                  {n.time&&<g>
                    <rect x={n.x+n.w-42} y={n.y+n.h-16} width="38" height="12" rx="6" fill={col.stroke+'1A'}/>
                    <text x={n.x+n.w-23} y={n.y+n.h-7} fontSize="8.5" fill={col.stroke} textAnchor="middle" fontWeight="700">{n.time}</text>
                  </g>}
                </g>
              );
            })}

            {/* ── EXIT section separator ── */}
            <line x1="0" y1="1875" x2={GW} y2="1875" stroke={C.line} strokeWidth="1" strokeDasharray="6,4"/>
            <text x="20" y="1892" fontSize="9.5" fontWeight="700" fill={C.ink3} letterSpacing=".06em">EXITS / RESOLUÇÕES</text>

            {/* ── EDGE CASES strip (far right column) ── */}
            <g>
              <text x="1160" y="590" fontSize="9.5" fontWeight="700" fill="#92400E" letterSpacing=".06em">EDGE CASES</text>
              {[
                {y:610, icon:'⚡', l:'Urgência: plantio', sub:'priorização imediata'},
                {y:658, icon:'🕐', l:'Fora de horário',   sub:'Assistente 24h'},
                {y:706, icon:'📱', l:'IA não entende',    sub:'fallback CSC'},
                {y:754, icon:'🔀', l:'Multi-problema',    sub:'multi-chamado'},
                {y:802, icon:'📋', l:'Caso duplicado',    sub:'deduplicação'},
              ].map((e,i)=>(
                <g key={i}>
                  <rect x="1150" y={e.y} width="190" height="40" rx="6" fill="#FFFBF0" stroke="#FDE68A" strokeWidth="1"/>
                  <text x="1163" y={e.y+16} fontSize="10.5">{e.icon}</text>
                  <text x="1183" y={e.y+16} fontSize="10.5" fontWeight="600" fill="#92400E">{e.l}</text>
                  <text x="1183" y={e.y+30} fontSize="9" fill={C.ink3}>{e.sub}</text>
                </g>
              ))}
            </g>

            {/* ── PROATIVO advantage callout ── */}
            <g>
              <rect x="920" y="240" width="210" height="76" rx="8" fill="#F0FDF4" stroke="#86EFAC" strokeWidth="1.5"/>
              <text x="932" y="260" fontSize="9.5" fontWeight="700" fill="#15803D">PROATIVO vs REATIVO</text>
              <text x="932" y="276" fontSize="9" fill="#166534">PROATIVO: 18% conversão</text>
              <text x="932" y="291" fontSize="9" fill="#166534">REATIVO: 2–3% conversão</text>
              <text x="932" y="308" fontSize="8" fill={C.ink3}>Sistema detecta subutilização</text>
            </g>

          </svg>
        </div>
      </div>

      {/* ── Selected node detail panel ── */}
      {selN&&(
        <div style={{marginTop:8,padding:'12px 16px',background:C.page,border:'1.5px solid '+(NODE_COLORS[selN.type]||NODE_COLORS.alt).stroke,borderRadius:10,display:'flex',gap:14,alignItems:'flex-start',flexShrink:0}}>
          <span style={{fontSize:22,flexShrink:0}}>{selN.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:800,color:(NODE_COLORS[selN.type]||NODE_COLORS.alt).text,marginBottom:2}}>{selN.label}</div>
            <div style={{fontSize:12,color:C.ink3,marginBottom:4}}>{selN.sub}{selN.actor?' · '+ACTOR_CONF[selN.actor].label:''}{selN.time?' · '+selN.time:''}</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {selN.actor&&<Pill bg={ACTOR_CONF[selN.actor].color+'18'} fg={ACTOR_CONF[selN.actor].color}>{ACTOR_CONF[selN.actor].emoji} {ACTOR_CONF[selN.actor].label}</Pill>}
              <Pill bg={(NODE_COLORS[selN.type]||NODE_COLORS.alt).fill} fg={(NODE_COLORS[selN.type]||NODE_COLORS.alt).text}>{selN.type==='decision'?'Ponto de decisão':selN.type==='happy'?'Happy path':selN.type==='loop'?'Loop de ativação':selN.type==='error'?'Erro/edge case':selN.type.startsWith('exit')?'Exit':'Alternativo'}</Pill>
            </div>
          </div>
          <button onClick={()=>setSelNode(null)} style={{background:'none',border:'none',cursor:'pointer',color:C.ink3,fontSize:16}}>✕</button>
        </div>
      )}

      {/* ── Keyboard hint ── */}
      <div style={{marginTop:5,flexShrink:0,display:'flex',alignItems:'center',gap:12,background:C.page,borderRadius:7,padding:'6px 14px',border:'1px solid '+C.line}}>
        <span style={{fontSize:10.5,color:C.ink3,flex:1}}>
          <b style={{color:C.ink2}}>Dica:</b> Clique em qualquer nó para ver o detalhe do momento · toggle "Só happy path" para focar no fluxo principal
        </span>
        <div style={{display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
          {[{col:'#22C55E',label:'Happy path ok'},
            {col:'#7C3AED',label:'Decisão'},
            {col:'#EA580C',label:'Loop'},
          ].map((l,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:C.ink3}}>
              <div style={{width:8,height:8,borderRadius:2,background:l.col}}/>{l.label}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════ */
const seed=()=>({customer:[],dealer:[],field:[]}); /* EMPTY — producer goes first */

function App(){
  const [tab,setTab]=useState('fluxo');const [step,setStep]=useState('s0');
  const [lang,setLang]=useState('pt');
  const [chat,setChat]=useState(seed);const [typing,setTyping]=useState({customer:null,dealer:null,field:null});
  const [flags,setFlags]=useState({resolved:null,agenda:null,csat:null});
  const [busy,setBusy]=useState(false);
  const [sentDocs,setSentDocs]=useState([]);
  const [seen,setSeen]=useState({fluxo:0,produtor:0,dealer:0,field:0,deere:0});
  const [toast,setToast]=useState(null);
  const [prodScreen,setProdScreen]=useState('list'); /* lifted so reset() can return to list */
  const timers=useRef([]);const toastT=useRef(null);const prevOwner=useRef(null);
  const clearTs=()=>{timers.current.forEach(clearTimeout);timers.current=[];};
  useEffect(()=>()=>clearTs(),[]);

  /* Active steps based on language */
  const ACTIVE_S = lang==='es' ? STEPS_ES : lang==='en' ? STEPS_EN : STEPS;

  const totalFor=k=>{
    if(k==='fluxo') return 0;
    if(k==='produtor') return chat.customer.filter(m=>!m.n).length;
    // dealer sees only messages relevant to dealer (from csc or system milestone events)
    const dealerMsgs=chat.customer.filter(m=>!m.n&&(m.f==='csc'||m.f==='bot'||m.f==='produtor')).length;
    if(k==='dealer') return dealerMsgs+chat.dealer.length;
    // field only sees messages when field is involved (field messages or visit confirmed)
    const fieldInvolved=flags.agenda!=null||chat.customer.some(m=>m.f==='field');
    const fieldMsgs=fieldInvolved?chat.customer.filter(m=>!m.n&&m.f==='field').length+chat.field.length:0;
    if(k==='field') return fieldMsgs;
    // deere sees dealer+field channels
    return chat.dealer.length+chat.field.length;
  };
  useEffect(()=>{setSeen(s=>({...s,[tab]:totalFor(tab)}));},[tab,chat]);
  const unseen=k=>Math.max(0,totalFor(k)-seen[k]);

  const fireToast=txt=>{setToast(txt);clearTimeout(toastT.current);toastT.current=setTimeout(()=>setToast(null),3000);};
  const appendTo=(k,ev)=>setChat(c=>({...c,[k]:[...c[k],ev]}));
  const setTyp=(k,who)=>setTyping(t=>({...t,[k]:who}));

  function playInto(k,events,startDelay){
    let t=startDelay||0;
    (events||[]).forEach(ev=>{
      if(ev.n){timers.current.push(setTimeout(()=>appendTo(k,ev),t));t+=500;}
      else{
        const dur=700+Math.min((ev.t||'').length*13,800);
        timers.current.push(setTimeout(()=>setTyp(k,ev.f),t));
        timers.current.push(setTimeout(()=>{appendTo(k,ev);setTyp(k,null);},t+dur));
        t+=dur+350;
      }
    });
    return t;
  }

  const currentStep=ACTIVE_S[step]||STEPS_EXT[step]||{enter:[],opts:[]};
  const opts=currentStep.opts||[];
  const waiting=busy?[]:[...new Set(opts.map(o=>o.role))];

  useEffect(()=>{
    if(busy)return;
    const owner=waiting[0]||null;
    if(owner&&owner!==prevOwner.current&&owner!==tab) fireToast('Vez de: '+ROLE_NAME[owner]);
    prevOwner.current=owner;
  },[busy,step]);

  function runCustomer(say,next,doFlags){
    setBusy(true);
    (say||[]).forEach(ev=>appendTo('customer',ev));
    const allSteps={...ACTIVE_S,...STEPS_EXT};
    const enter=next?(allSteps[next]?allSteps[next].enter:[]):[];
    const total=playInto('customer',enter,380);
    timers.current.push(setTimeout(()=>{
      if(next)setStep(next);
      if(doFlags)setFlags(f=>({...f,...doFlags}));
      setBusy(false);
    },total+100));
  }

  const choose=o=>runCustomer(o.say,o.next,o.do);

  function writeFree(text){
    setBusy(true);
    appendTo('customer',{f:'produtor',t:text,time:'agora',out:true});
    const total=playInto('customer',[{f:'bot',t:'Recebi! Para te ajudar melhor, toque numa das opções abaixo 👇',time:'agora'}],500);
    timers.current.push(setTimeout(()=>setBusy(false),total+100));
  }

  function reengage(){
    appendTo('customer',{f:'csc',t:'Oi João, conseguiu dar uma olhada? Fico à disposição para continuar 👍',time:'agora'});
    if(tab!=='produtor') fireToast('Dealer reengajou o produtor');
  }

  function sendDoc(doc){
    /* Mark doc as sent */
    setSentDocs(s=>s.includes(doc.id)?s:[...s,doc.id]);
    /* Inject resource card into customer chat */
    const who=tab==='field'?'field':'csc';
    const senderName=tab==='field'?'Diego · Field Trainer':'Carlos · AgroBaggio';
    const now=new Date();
    const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    appendTo('customer',{f:who,t:doc.sendMsg,time:t,k:'doc',docTitle:doc.title,docIcon:doc.icon});
    fireToast('Recurso enviado ao produtor ✓');
  }

  function runStep(id){
    const def=DEALER_INIT.find(d=>d.id===id);
    if(!def)return;
    setBusy(true);
    const enter=def.step.enter||[];const total=playInto('customer',enter,300);
    const newStep={...def.step};
    timers.current.push(setTimeout(()=>{setStep(id+'_active');setBusy(false);},total+100));
    /* register ephemeral step */
    STEPS[id+'_active']={enter:[],opts:def.step.opts};
  }

  function sendDealer(m){
    appendTo('dealer',{f:'deere',t:m.msg,time:'agora'});
    playInto('dealer',[m.reply],580);
    if(m.customerStep)runCustomer([],m.customerStep,null);
    if(tab!=='dealer') fireToast('Deere → Dealer');
  }
  function sendField(m){
    appendTo('field',{f:'deere',t:m.msg,time:'agora'});
    playInto('field',[m.reply],580);
    if(tab!=='field') fireToast('Deere → Field Trainer');
  }
  const chSendDealer=ev=>appendTo('dealer',{...ev,time:'agora'});
  const chSendField=ev=>appendTo('field',{...ev,time:'agora'});

  function reset(){
    clearTs();setStep('s0');setChat(seed());
    setTyping({customer:null,dealer:null,field:null});
    setFlags({resolved:null,agenda:null,csat:null});
    setBusy(false);setSentDocs([]);setSeen({fluxo:0,produtor:0,dealer:0,field:0,deere:0});
    setProdScreen('list');
    setToast(null);
  }

  function changeLang(l){
    setLang(l);
    /* Reset demo when switching language so STEPS match the new language */
    clearTs();setStep('s0');setChat(seed());
    setTyping({customer:null,dealer:null,field:null});
    setFlags({resolved:null,agenda:null,csat:null});
    setBusy(false);setSentDocs([]);setSeen({fluxo:0,produtor:0,dealer:0,field:0,deere:0});
    setProdScreen('list');setToast(null);
  }

  const TABS=[
    ['fluxo',Activity,tg(lang,'tabFluxo')],
    ['produtor',Smartphone,tg(lang,'tabProdutor')],
    ['dealer',Building2,tg(lang,'tabDealer')],
    ['field',Wrench,tg(lang,'tabField')],
    ['deere',ShieldCheck,tg(lang,'tabDeere')],
  ];
  const turnoOf=r=>!busy&&waiting.includes(r);

  return (
    <div style={{fontFamily:"'Barlow',system-ui,sans-serif",background:C.page,height:'100%',display:'flex',flexDirection:'column',color:C.ink}}>
      {/* Toast */}
      {toast&&<div style={{position:'fixed',top:16,right:18,zIndex:999,background:C.side,color:'#fff',padding:'12px 16px',borderRadius:8,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:8,boxShadow:'var(--shadow-lg)',animation:'slidein .2s ease-out'}}>
        <Bell size={15} style={{color:C.yellow}}/>{toast}
      </div>}
      {/* Header */}
      <div style={{background:C.side,color:'#fff',padding:'0 20px',display:'flex',alignItems:'center',gap:14,height:56,position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 8px rgba(0,0,0,.3)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <JDBadge size={28}/>
          <div className="header-logo-text" style={{fontWeight:700,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.04em',lineHeight:1}}>
            OPERATIONS<br/><span style={{fontSize:10,fontWeight:400,opacity:.7,letterSpacing:'.06em'}}>SUPPORT · BRASIL</span>
          </div>
        </div>
        <div style={{width:1,height:28,background:'rgba(255,255,255,.15)',flexShrink:0}}/>
        <div style={{display:'flex',gap:0,flex:1,overflowX:'auto',scrollbarWidth:'none'}}>
          {TABS.map(([k,Ic,t])=>{
            const on=tab===k;const u=unseen(k);
            return (
              <button key={k} onClick={()=>setTab(k)} className={'tab-btn'+(on?' on':'')}>
                <Ic size={15}/>
                <span className="tab-label">{t}</span>
                {!on&&u>0&&<span style={{minWidth:18,height:18,padding:'0 4px',borderRadius:9,background:C.yellow,color:C.yellowD,fontSize:10.5,fontWeight:800,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>{u}</span>}
                {!on&&u===0&&turnoOf(k)&&<span style={{width:7,height:7,borderRadius:7,background:C.yellow}}/>}
              </button>
            );
          })}
        </div>
        {/* Language switcher */}
        <div style={{display:'flex',gap:3,flexShrink:0,marginRight:8}}>
          {['pt','es','en'].map(l=>(
            <button key={l} onClick={()=>changeLang(l)}
              style={{background:lang===l?'rgba(255,255,255,.22)':'transparent',color:'#fff',border:'1px solid '+(lang===l?'rgba(255,255,255,.5)':'rgba(255,255,255,.18)'),borderRadius:5,padding:'3px 8px',fontSize:11,fontWeight:700,cursor:'pointer',letterSpacing:'.04em',transition:'all 150ms',lineHeight:1.2}}>
              {LANG_META[l].flag} {LANG_META[l].label}
            </button>
          ))}
        </div>
        <button onClick={reset} className="jd-btn-ghost" style={{background:'transparent',color:'#fff',border:'1px solid rgba(255,255,255,.25)',fontSize:12,flexShrink:0}}>
          <RotateCcw size={13}/>{tg(lang,'reset')}
        </button>
      </div>
      {/* Modo Demo banner */}
      <div style={{background:'linear-gradient(90deg,#EDF7EA 0%,#F0FFF4 100%)',borderBottom:'2px solid #C8E6C0',padding:'7px 24px',display:'flex',alignItems:'center',gap:0,flexShrink:0,boxShadow:'0 1px 4px rgba(54,124,43,.08)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,paddingRight:20,borderRight:'1.5px solid #A5D6A7',marginRight:20,flexShrink:0}}>
          <span style={{fontSize:10,fontWeight:900,letterSpacing:'.12em',color:'#fff',textTransform:'uppercase',background:C.green,borderRadius:5,padding:'3px 9px',boxShadow:'0 1px 4px rgba(54,124,43,.25)'}}>{tg(lang,'modeDemo')}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16,flex:1,minWidth:0}}>
          <span style={{fontSize:12.5,color:C.ink2,lineHeight:1.4,flex:1,minWidth:0}}>
            {tg(lang,'demoBanner')}
            <span style={{color:C.ink3,marginLeft:6,fontSize:12}}>{tg(lang,'demoBannerSub')}</span>
          </span>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {[['fluxo','tabFluxo','👁️'],['produtor','tabProdutor','👨‍🌾'],['dealer','tabDealer','🖥️'],['field','tabField','🏃'],['deere','tabDeere','🛡️']].map(([k,tlk,emoji])=>(
              <div key={k} style={{display:'flex',alignItems:'center',gap:3,fontSize:11,fontWeight:tab===k?700:500,color:tab===k?C.greenD:C.ink3,background:tab===k?'rgba(54,124,43,.1)':'transparent',borderRadius:5,padding:'2px 7px',border:tab===k?'1px solid #A5D6A7':'1px solid transparent',transition:'all 150ms'}}>
                <span style={{fontSize:10}}>{emoji}</span>{tg(lang,tlk)}
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* Content — viewport-locked, no page scroll */}
      <div style={{padding:tab==='fluxo'?'4px 24px 0':'12px 24px',maxWidth:1320,margin:'0 auto',flex:1,minHeight:0,overflow:'hidden',boxSizing:'border-box',display:'flex',flexDirection:'column'}}>
        {tab==='fluxo'&&<Fluxo lang={lang}/>}
        {tab==='produtor'&&<VProdutor lang={lang} log={chat.customer} opts={opts} choose={choose} waiting={waiting} busy={busy} typing={typing.customer} turno={turnoOf('produtor')} onWrite={writeFree} screen={prodScreen} setScreen={setProdScreen} setTab={setTab}/>}
        {tab==='dealer'&&<VDealer lang={lang} log={chat.customer} opts={opts} choose={choose} waiting={waiting} busy={busy} typing={typing.customer} flags={flags} step={step} runStep={runStep} chDealer={chat.dealer} chSendDealer={chSendDealer} typingDealer={typing.dealer} turno={turnoOf('dealer')} reengage={reengage} onSendDoc={sendDoc} sentDocs={sentDocs}/>}
        {tab==='field'&&<VField lang={lang} log={chat.customer} opts={opts} choose={choose} waiting={waiting} busy={busy} typing={typing.customer} flags={flags} step={step} chField={chat.field} chSendField={chSendField} typingField={typing.field} turno={turnoOf('field')} onSendDoc={sendDoc} sentDocs={sentDocs}/>}
        {tab==='deere'&&<VDeere lang={lang} log={chat.customer} flags={flags} step={step} typing={typing.customer} chDealer={chat.dealer} chField={chat.field} sendDealer={sendDealer} sendField={sendField} typingDealer={typing.dealer} typingField={typing.field}/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
