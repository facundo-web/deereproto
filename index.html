function LI({ name, size=16, style:st, className }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const key = name.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    const fn = lucide[key] || lucide.Circle;
    ref.current.innerHTML = '';
    const svg = lucide.createElement(fn);
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke-width', '2'); svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    ref.current.appendChild(svg);
  }, [name, size]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',flexShrink:0,...st}} className={className}/>;
}

/* ─── UI Helpers ──────────────────────────────────────── */
function Pill({children,bg,fg,size}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,background:bg,color:fg,fontSize:size||11,fontWeight:600,padding:'2px 8px',borderRadius:4,whiteSpace:'nowrap'}}>{children}</span>;
}
function statusOf(flags,step){
  if(flags.resolved)return{t:'RESOLVIDO',bg:C.okBg,fg:C.ok};
  if(step==='sPausa')return{t:'PAUSADO',bg:C.critBg,fg:C.crit};
  if(step==='s0')return{t:'AGUARDANDO',bg:C.line2,fg:C.ink3};
  return{t:'EM ANDAMENTO',bg:C.warnBg,fg:C.warn};
}
function ecOf(e){
  if(/resolv|referên/i.test(e))return{bg:C.okBg,fg:C.ok};
  if(/risco|parado|atras|nunca/i.test(e))return{bg:C.critBg,fg:C.crit};
  if(/fila|andamento/i.test(e))return{bg:C.warnBg,fg:C.warn};
  return{bg:C.line2,fg:C.ink2};
}
function Bar({v,c}){
  return <div style={{display:'flex',alignItems:'center',gap:8}}>
    <div style={{flex:1,height:5,background:C.line2,borderRadius:4,overflow:'hidden'}}>
      <div style={{width:v+'%',height:'100%',background:c||C.green,transition:'width .4s ease'}}/>
    </div>
    <span style={{fontSize:11,fontWeight:600,width:32,textAlign:'right',fontFamily:"'JetBrains Mono',monospace",color:C.ink2}}>{v}%</span>
  </div>;
}
function KPI({label,value,sub,Icon,tone}){
  const tc=tone==='crit'?C.crit:tone==='ok'?C.ok:C.ink;
  return <div style={{border:'1px solid '+C.line,borderRadius:8,padding:'14px 16px',background:C.card,boxShadow:'var(--shadow-sm)',transition:'box-shadow 150ms'}}
    onMouseEnter={e=>e.currentTarget.style.boxShadow='var(--shadow-md)'}
    onMouseLeave={e=>e.currentTarget.style.boxShadow='var(--shadow-sm)'}>
    <div style={{display:'flex',alignItems:'center',gap:6,color:C.ink3,fontSize:11,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}><Icon size={13} style={{color:tone==='crit'?C.crit:C.green}}/>{label}</div>
    <div style={{fontSize:28,fontWeight:700,color:tc,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.01em'}}>{value}</div>
    {sub&&<div style={{fontSize:10,color:C.ink4,marginTop:4}}>{sub}</div>}
  </div>;
}
function Tbl({head,rows}){
  return <div style={{border:'1px solid '+C.line,borderRadius:8,overflow:'hidden',background:C.card,boxShadow:'var(--shadow-sm)'}}>
    <div style={{overflowX:'auto'}}>
    <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
      <thead><tr style={{background:C.page}}>
        {head.map((h,i)=><th key={i} style={{textAlign:'left',padding:'10px 14px',fontSize:10.5,fontWeight:700,color:C.ink3,textTransform:'uppercase',letterSpacing:'.07em',borderBottom:'1px solid '+C.line,whiteSpace:'nowrap'}}>{h}</th>)}
      </tr></thead>
      <tbody>
        {rows.map((r,i)=><tr key={i} className="row-hover" style={{borderBottom:'1px solid '+C.line2,transition:'background 150ms',cursor:'default'}}>
          {r.map((cell,j)=><td key={j} style={{padding:'10px 14px',verticalAlign:'middle'}}>{cell}</td>)}
        </tr>)}
      </tbody>
    </table>
    </div>
  </div>;
}

const CASE_TIMELINE_DATA=[
  {time:'08:11',who:'produtor',label:'Produtor inicia contato',detail:'AutoTrac não engata na X9'},
  {time:'08:12',who:'bot',label:'Triagem automática',detail:'Ramo 4 · prioridade Alta · #BR-4471 aberto'},

  {time:'08:22',who:'csc',label:'Diagnóstico: sinal StarFire 2/5',detail:'Proposta de visita enviada ao produtor'},
  {time:'08:26',who:'produtor',label:'Visita confirmada',detail:'Amanhã 9h · talhão norte'},
  {time:'10:48',who:'field',label:'Field Trainer recalibrou',detail:'Antena reposicionada · AutoTrac 100% ✅'},
  {time:'11:00',who:'csc',label:'Fechamento do caso',detail:'CSAT coletado · caso encerrado'},
  {time:'D+7',who:'bot',label:'Follow-up de adoção',detail:'Confirmar uso do AutoTrac e AutoPath'},
];
function CaseTimeline({flags,step}){
  const resolved=!!flags.resolved;
  const fieldDone=['sResolvido','sCsat','sFim','sFimRuim'].includes(step)||resolved;
  const items=CASE_TIMELINE_DATA.map((it,i)=>{
    let done=it.done||false;
    if(i<=4) done=true; /* always shown as complete for demo context */
    if(i===5) done=fieldDone;
    if(i===6) done=['sCsat','sFim','sFimRuim'].includes(step)||resolved;
    if(i===7) done=flags.csat!=null;
    return {...it,done};
  });
  const curIdx=items.reduce((a,it,i)=>it.done?i:a,-1);
  return (
    <div style={{padding:'8px 14px 4px'}}>
        {items.map((it,i)=>{
          const isCur=i===curIdx+1&&!it.done;
          return (
            <div key={i} style={{display:'flex',gap:10,paddingBottom:i<items.length-1?10:4,position:'relative'}}>
              {i<items.length-1&&<div style={{position:'absolute',left:9,top:20,width:2,height:'calc(100% - 4px)',background:it.done?C.green:C.line2}}/>}
              <div style={{width:20,height:20,borderRadius:20,background:it.done?C.green:isCur?C.warnBg:C.line2,border:'2px solid '+(it.done?C.green:isCur?C.warn:C.line),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,zIndex:1,transition:'all 300ms'}}>
                {it.done&&<Check size={10} style={{color:'#fff'}}/>}
                {isCur&&<span style={{width:6,height:6,borderRadius:6,background:C.warn,display:'block'}}/>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:1}}>
                  <span style={{fontSize:11.5,fontWeight:600,color:it.done?C.ink:isCur?C.warn:C.ink3}}>{it.label}</span>
                  {isCur&&<Pill bg={C.warnBg} fg={C.warn}>atual</Pill>}
                </div>
                <div style={{fontSize:10.5,color:C.ink3,lineHeight:1.4}}>{it.detail}</div>
                <div style={{fontSize:10,color:C.ink4,marginTop:1}}>{it.time}</div>
              </div>
            </div>
          );
        })}
    </div>
  );
}

  const plotW=X(N-1)+130;const pathd=(a,b)=>'M '+a[0]+' '+a[1]+' C '+(a[0]+48)+' '+a[1]+', '+(b[0]-48)+' '+b[1]+', '+b[0]+' '+b[1];
  const cur=STG[step];const cc=canalCor(cur.canal);
  const stCor=t=>/Automatizado/.test(t)?{bg:'#EDE7F6',fg:'#6A1B9A'}:/Field/.test(t)?{bg:'#FFF3E0',fg:'#E65100'}:/CSC/.test(t)?{bg:C.okBg,fg:C.greenD}:{bg:C.line2,fg:C.ink2};
  return (
    <div className="fluxo-wrap">
      {/* Header */}
      <div style={{marginBottom:10,flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:C.green,marginBottom:3}}>Como funciona</div>
        <h1 style={{fontSize:24,fontWeight:800,margin:'0 0 4px',fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.01em',textTransform:'uppercase'}}>O fluxo completo — clique em cada momento</h1>
        <div style={{fontSize:13.5,color:C.ink2,lineHeight:1.5,maxWidth:700}}>O produtor sempre <b>inicia</b> o contato. Cada ator entra no canal certo. A Deere acompanha tudo em tempo real.</div>
      </div>
      {/* Map area */}
      <div className="fluxo-map-area">
        <div style={{display:'flex',border:'1px solid '+C.line,borderRadius:8,overflow:'hidden',background:C.card,boxShadow:'var(--shadow-sm)',flex:1,minHeight:0}}>
          <div style={{position:'relative',width:176,flexShrink:0,borderRight:'1px solid '+C.line,background:C.page}}>
            <div style={{position:'absolute',left:12,top:30,right:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}><JDBadge size={20}/><span style={{fontSize:12,fontWeight:700,color:C.side,fontFamily:"'Barlow Condensed',sans-serif"}}>JOHN DEERE</span></div>
              <div style={{fontSize:9.5,color:C.ink3,marginTop:1,marginLeft:28}}>visão cross</div>
            </div>
            {FLANES.map(l=>(
              <div key={l.k} style={{position:'absolute',left:12,top:FLY[l.k]-18,right:6}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}><Avatar who={l.who} size={22}/><span style={{fontSize:13,fontWeight:600,lineHeight:1.1}}>{l.t}</span></div>
                <div style={{fontSize:10,color:C.ink3,marginTop:1,marginLeft:30}}>{l.s}</div>
              </div>
            ))}
          </div>
          <div ref={scrollRef} style={{overflowX:'auto',flex:1}}>
            <div style={{position:'relative',width:plotW,height:440}}>
              <div style={{position:'absolute',left:0,top:26,width:plotW,height:34,background:'#F2F5F1',borderBottom:'1px dashed '+C.side,display:'flex',alignItems:'center',paddingLeft:14}}>
                <span style={{fontSize:10.5,color:C.side,fontWeight:600}}>Deere acompanha cada passo — métricas, satisfação e coordenação cross</span>
              </div>
              {FLANES.map(l=><div key={l.k} style={{position:'absolute',left:0,top:FLY[l.k]-27,width:plotW,height:54,borderTop:'1px solid '+C.line2}}/>)}
              <svg width={plotW} height="440" viewBox={'0 0 '+plotW+' 440'} style={{position:'absolute',inset:0,zIndex:1,pointerEvents:'none'}}>
                <defs><marker id="fah" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></marker></defs>
                {segs.map((sg,i)=>{const done=step>sg.from;const cur2=step===sg.from+1;return <path key={i} d={pathd(sg.a,sg.b)} fill="none" stroke={done||cur2?C.green:'#D6DDCF'} strokeWidth={done||cur2?2.5:1.5} markerEnd="url(#fah)" style={{transition:'stroke .35s,stroke-width .2s'}}/>;  })}
              </svg>
              {STG.map((n,i)=>{
                const done=i<step;const sel=i===step;const fut=i>step;
                const x=X(i),y=FLY[n.lane];
                return(
                  <div key={i} onClick={()=>setStep(i)} style={{position:'absolute',left:x-70,top:y-27,width:140,zIndex:2,cursor:'pointer',transition:'opacity .25s,transform .2s',transform:sel?'translateY(-3px)':'none',opacity:fut?.28:1}}>
                    <div style={{background:sel?C.greenL:done?'#f0f8ee':C.card,border:(sel?2:1.5)+'px solid '+(sel?C.green:done?C.green:'#D6DDCF'),borderRadius:8,padding:'7px 10px',boxShadow:sel?'var(--shadow-md)':'var(--shadow-sm)',transition:'all 150ms',animation:sel?'pulse-ring 2s ease-out infinite':undefined,position:'relative'}}>
                      {done&&<span style={{position:'absolute',top:-6,right:-6,width:16,height:16,borderRadius:16,background:C.green,border:'2px solid #fff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        <Check size={9} style={{color:'#fff'}}/>
                      </span>}
                      {n.branches&&<span style={{position:'absolute',top:-6,left:-6,background:'#7C3AED',color:'#fff',fontSize:8,fontWeight:700,borderRadius:4,padding:'1px 5px',letterSpacing:'.03em',border:'1.5px solid #fff'}}>2 caminhos</span>}
                      {n.ret&&<div style={{display:'flex',alignItems:'center',gap:4,marginBottom:3}}><ArrowLeft size={10} style={{color:C.waHead}}/><span style={{fontSize:8,fontWeight:700,color:C.waHead,letterSpacing:'.04em',textTransform:'uppercase'}}>volta ao produtor</span></div>}
                      <div style={{display:'flex',alignItems:'center',gap:5}}><Avatar who={n.who} size={18}/><span style={{fontSize:13,fontWeight:600,lineHeight:1.15}}>{n.t}</span></div>
                      <div style={{fontSize:10,color:C.ink3,marginTop:3}}>{n.time} · {n.canal}</div>
                    </div>
                  </div>
                );})}
            </div>
          </div>
        </div>
      </div>
      {/* Controls */}
      <div style={{display:'flex',alignItems:'center',gap:10,margin:'10px 0 4px',flexShrink:0}}>
        <button onClick={()=>setStep(x=>Math.max(0,x-1))} className="jd-btn-ghost" disabled={step===0}
          style={{opacity:step===0?.35:1,cursor:step===0?'not-allowed':'pointer'}}>
          <ChevronLeft size={15}/>Anterior
        </button>
        <button onClick={()=>setStep(x=>Math.min(N-1,x+1))} className="jd-btn" disabled={step===N-1}
          style={{opacity:step===N-1?.5:1,cursor:step===N-1?'not-allowed':'pointer',minWidth:110}}>
          Próximo<ChevronRight size={15}/>
        </button>
        <span style={{fontSize:13,color:C.ink3,marginLeft:4}}>Passo <b style={{color:C.ink}}>{step+1}</b> de {N}</span>
        {cur.branches&&<span style={{fontSize:12,color:'#7C3AED',fontWeight:600,marginLeft:8,display:'flex',alignItems:'center',gap:4}}><GitBranch size={13}/>Passo com bifurcação</span>}
      </div>
      {/* Context panel */}
      <div className="fluxo-ctx-area">
        <div style={{display:'flex',gap:16,flexWrap:'wrap',background:C.page,padding:'16px 16px 20px'}}>
          {/* Left: actor + description */}
          <div style={{flex:'1 1 280px',minWidth:240}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
              <Avatar who={cur.who} size={38}/>
              <div>
                <div style={{fontSize:16,fontWeight:700}}>{PROF[cur.who]?PROF[cur.who].name.split(' · ')[0]:cur.who}</div>
                <div style={{fontSize:12,color:C.ink3,marginTop:1}}>{cur.t} · {cur.time}</div>
              </div>
            </div>
            {/* Channel + Platform + Support type chips */}
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
              <Pill bg={cc.bg} fg={cc.fg}><MessageCircle size={11}/>Canal: {cur.canal}</Pill>
              <Pill bg='#E3F2FD' fg='#1565C0'><Monitor size={11}/>Plataforma: {cur.platform}</Pill>
              <Pill bg={stCor(cur.supportType).bg} fg={stCor(cur.supportType).fg}>
                {/Automatizado/.test(cur.supportType)?<Radio size={11}/>:<Users size={11}/>}
                {cur.supportType}
              </Pill>
            </div>
            <div style={{fontSize:14,color:C.ink2,lineHeight:1.7}}>{cur.desc}</div>
          </div>
          {/* Right: message card + branches */}
          <div style={{flex:'0 0 auto',display:'flex',flexDirection:'column',gap:10,minWidth:220}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:C.ink3,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Mensagem do momento</div>
              <div style={{background:C.waIn,border:'1px solid '+C.line,borderRadius:10,padding:14,boxShadow:'var(--shadow-sm)',minWidth:220}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><Avatar who={cur.who} size={24}/><span style={{fontSize:13,fontWeight:600}}>{PROF[cur.who]?PROF[cur.who].name.split(' · ')[0]:cur.who}</span></div>
                <div style={{fontSize:13.5,color:C.ink,background:cur.out?C.waOut:'#f0f2f0',borderRadius:8,padding:'8px 10px',lineHeight:1.4}}>{cur.msg}</div>
              </div>
            </div>
            {cur.branches&&(
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'#7C3AED',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6,display:'flex',alignItems:'center',gap:5}}><GitBranch size={12}/>Caminhos possíveis</div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {cur.branches.map((b,i)=>(
                    <div key={i} style={{background:i===0?'#F3E8FF':'#FFF3E0',border:'1px solid '+(i===0?'#DDD6FE':'#FFCC80'),borderRadius:8,padding:'8px 12px'}}>
                      <div style={{fontSize:13,fontWeight:700,color:i===0?'#6D28D9':'#C05621',marginBottom:2}}>{b.icon} {b.label}</div>
                      <div style={{fontSize:11.5,color:C.ink3,lineHeight:1.4}}>{b.desc}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════ */
const seed=()=>({customer:[],dealer:[],field:[]}); /* EMPTY — producer goes first */

function App(){
  const [tab,setTab]=useState('fluxo');const [step,setStep]=useState('s0');
  const [chat,setChat]=useState(seed);const [typing,setTyping]=useState({customer:null,dealer:null,field:null});
  const [flags,setFlags]=useState({resolved:null,agenda:null,csat:null});
  const [busy,setBusy]=useState(false);
  const [sentDocs,setSentDocs]=useState([]);
  const [seen,setSeen]=useState({fluxo:0,produtor:0,dealer:0,field:0,deere:0});
  const [toast,setToast]=useState(null);
  const [prodScreen,setProdScreen]=useState('list'); /* lifted so reset() can return to list */
  const timers=useRef([]);const toastT=useRef(null);const prevOwner=useRef(null);
  const clearTs=()=>{timers.current.forEach(clearTimeout);timers.current=[];};
  useEffect(()=>()=>clearTs(),[]);

  const totalFor=k=>{if(k==='fluxo')return 0;const cu=chat.customer.length;if(k==='produtor')return cu;if(k==='dealer')return cu+chat.dealer.length;if(k==='field')return cu+chat.field.length;return cu+chat.dealer.length+chat.field.length;};
  useEffect(()=>{setSeen(s=>({...s,[tab]:totalFor(tab)}));},[tab,chat]);
  const unseen=k=>Math.max(0,totalFor(k)-seen[k]);

  const fireToast=txt=>{setToast(txt);clearTimeout(toastT.current);toastT.current=setTimeout(()=>setToast(null),3000);};
  const appendTo=(k,ev)=>setChat(c=>({...c,[k]:[...c[k],ev]}));
  const setTyp=(k,who)=>setTyping(t=>({...t,[k]:who}));

  function playInto(k,events,startDelay){
    let t=startDelay||0;
    (events||[]).forEach(ev=>{
      if(ev.n){timers.current.push(setTimeout(()=>appendTo(k,ev),t));t+=500;}
      else{
        const dur=700+Math.min((ev.t||'').length*13,800);
        timers.current.push(setTimeout(()=>setTyp(k,ev.f),t));
        timers.current.push(setTimeout(()=>{appendTo(k,ev);setTyp(k,null);},t+dur));
        t+=dur+350;
      }
    });
    return t;
  }

  const currentStep=STEPS[step]||STEPS_EXT[step]||{enter:[],opts:[]};
  const opts=currentStep.opts||[];
  const waiting=busy?[]:[...new Set(opts.map(o=>o.role))];

  useEffect(()=>{
    if(busy)return;
    const owner=waiting[0]||null;
    if(owner&&owner!==prevOwner.current&&owner!==tab) fireToast('Vez de: '+ROLE_NAME[owner]);
    prevOwner.current=owner;
  },[busy,step]);

  function runCustomer(say,next,doFlags){
    setBusy(true);
    (say||[]).forEach(ev=>appendTo('customer',ev));
    const allSteps={...STEPS,...STEPS_EXT};
    const enter=next?(allSteps[next]?allSteps[next].enter:[]):[];
    const total=playInto('customer',enter,380);
    timers.current.push(setTimeout(()=>{
      if(next)setStep(next);
      if(doFlags)setFlags(f=>({...f,...doFlags}));
      setBusy(false);
    },total+100));
  }

  const choose=o=>runCustomer(o.say,o.next,o.do);

  function writeFree(text){
    setBusy(true);
    appendTo('customer',{f:'produtor',t:text,time:'agora',out:true});
    const total=playInto('customer',[{f:'bot',t:'Recebi! Para te ajudar melhor, toque numa das opções abaixo 👇',time:'agora'}],500);
    timers.current.push(setTimeout(()=>setBusy(false),total+100));
  }

  function reengage(){
    appendTo('customer',{f:'csc',t:'Oi João, conseguiu dar uma olhada? Fico à disposição para continuar 👍',time:'agora'});
    if(tab!=='produtor') fireToast('Dealer reengajou o produtor');
  }

  function sendDoc(doc){
    /* Mark doc as sent */
    setSentDocs(s=>s.includes(doc.id)?s:[...s,doc.id]);
    /* Inject resource card into customer chat */
    const who=tab==='field'?'field':'csc';
    const senderName=tab==='field'?'Diego · Field Trainer':'Carlos · AgroBaggio';
    const now=new Date();
    const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    appendTo('customer',{f:who,t:doc.sendMsg,time:t,k:'doc',docTitle:doc.title,docIcon:doc.icon});
    fireToast('Recurso enviado ao produtor ✓');
  }

  function runStep(id){
    const def=DEALER_INIT.find(d=>d.id===id);
    if(!def)return;
    setBusy(true);
    const enter=def.step.enter||[];const total=playInto('customer',enter,300);
    const newStep={...def.step};
    timers.current.push(setTimeout(()=>{setStep(id+'_active');setBusy(false);},total+100));
    /* register ephemeral step */
    STEPS[id+'_active']={enter:[],opts:def.step.opts};
  }

  function sendDealer(m){
    appendTo('dealer',{f:'deere',t:m.msg,time:'agora'});
    playInto('dealer',[m.reply],580);
    if(m.customerStep)runCustomer([],m.customerStep,null);
    if(tab!=='dealer') fireToast('Deere → Dealer');
  }
  function sendField(m){
    appendTo('field',{f:'deere',t:m.msg,time:'agora'});
    playInto('field',[m.reply],580);
    if(tab!=='field') fireToast('Deere → Field Trainer');
  }
  const chSendDealer=ev=>appendTo('dealer',{...ev,time:'agora'});
  const chSendField=ev=>appendTo('field',{...ev,time:'agora'});

  function reset(){
    clearTs();setStep('s0');setChat(seed());
    setTyping({customer:null,dealer:null,field:null});
    setFlags({resolved:null,agenda:null,csat:null});
    setBusy(false);setSentDocs([]);setSeen({fluxo:0,produtor:0,dealer:0,field:0,deere:0});
    setProdScreen('list'); /* return Produtor to WA list screen */
    setToast(null);
  }

  const TABS=[['fluxo',Activity,'Fluxo'],['produtor',Smartphone,'Produtor'],['dealer',Building2,'Dealer'],['field',Wrench,'Field Trainer'],['deere',ShieldCheck,'Deere']];
  const turnoOf=r=>!busy&&waiting.includes(r);

  return (
    <div style={{fontFamily:"'Barlow',system-ui,sans-serif",background:C.page,height:'100%',display:'flex',flexDirection:'column',color:C.ink}}>
      {/* Toast */}
      {toast&&<div style={{position:'fixed',top:16,right:18,zIndex:999,background:C.side,color:'#fff',padding:'12px 16px',borderRadius:8,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:8,boxShadow:'var(--shadow-lg)',animation:'slidein .2s ease-out'}}>
        <Bell size={15} style={{color:C.yellow}}/>{toast}
      </div>}
      {/* Header */}
      <div style={{background:C.side,color:'#fff',padding:'0 20px',display:'flex',alignItems:'center',gap:14,height:56,position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 8px rgba(0,0,0,.3)'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <JDBadge size={28}/>
          <div className="header-logo-text" style={{fontWeight:700,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'.04em',lineHeight:1}}>
            OPERATIONS<br/><span style={{fontSize:10,fontWeight:400,opacity:.7,letterSpacing:'.06em'}}>SUPPORT · BRASIL</span>
          </div>
        </div>
        <div style={{width:1,height:28,background:'rgba(255,255,255,.15)',flexShrink:0}}/>
        <div style={{display:'flex',gap:0,flex:1,overflowX:'auto',scrollbarWidth:'none'}}>
          {TABS.map(([k,Ic,t])=>{
            const on=tab===k;const u=unseen(k);
            return (
              <button key={k} onClick={()=>setTab(k)} className={'tab-btn'+(on?' on':'')}>
                <Ic size={15}/>
                <span className="tab-label">{t}</span>
                {!on&&u>0&&<span style={{minWidth:18,height:18,padding:'0 4px',borderRadius:9,background:C.yellow,color:C.yellowD,fontSize:10.5,fontWeight:800,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>{u}</span>}
                {!on&&u===0&&turnoOf(k)&&<span style={{width:7,height:7,borderRadius:7,background:C.yellow}}/>}
              </button>
            );
          })}
        </div>
        <button onClick={reset} className="jd-btn-ghost" style={{background:'transparent',color:'#fff',border:'1px solid rgba(255,255,255,.25)',fontSize:12,flexShrink:0}}>
          <RotateCcw size={13}/>Reiniciar
        </button>
      </div>
      {/* Modo Demo banner */}
      <div style={{background:'#EDF7EA',borderBottom:'1px solid #C8E6C0',padding:'6px 24px',display:'flex',alignItems:'center',gap:0,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,paddingRight:20,borderRight:'1px solid #C8E6C0',marginRight:20,flexShrink:0}}>
          <span style={{fontSize:10,fontWeight:800,letterSpacing:'.1em',color:C.greenD,textTransform:'uppercase',background:C.greenL,border:'1px solid #A5D6A7',borderRadius:4,padding:'2px 7px'}}>Modo Demo</span>
        </div>
        <span style={{fontSize:13,color:C.ink2,lineHeight:1.4}}>
          Cada aba mostra o <b>mesmo caso</b> do ponto de vista de um ator diferente.
          <span style={{color:C.ink3,marginLeft:8}}>O produtor sempre inicia. Contadores nas abas indicam novas mensagens.</span>
        </span>
      </div>
      {/* Content — viewport-locked, no page scroll */}
      <div style={{padding:tab==='fluxo'?'4px 24px 0':'12px 24px',maxWidth:1320,margin:'0 auto',flex:1,minHeight:0,overflow:'hidden',boxSizing:'border-box',display:'flex',flexDirection:'column'}}>
        {tab==='fluxo'&&<Fluxo/>}
        {tab==='produtor'&&<VProdutor log={chat.customer} opts={opts} choose={choose} waiting={waiting} busy={busy} typing={typing.customer} turno={turnoOf('produtor')} onWrite={writeFree} screen={prodScreen} setScreen={setProdScreen} setTab={setTab}/>}
        {tab==='dealer'&&<VDealer log={chat.customer} opts={opts} choose={choose} waiting={waiting} busy={busy} typing={typing.customer} flags={flags} step={step} runStep={runStep} chDealer={chat.dealer} chSendDealer={chSendDealer} typingDealer={typing.dealer} turno={turnoOf('dealer')} reengage={reengage} onSendDoc={sendDoc} sentDocs={sentDocs}/>}
        {tab==='field'&&<VField log={chat.customer} opts={opts} choose={choose} waiting={waiting} busy={busy} typing={typing.customer} flags={flags} step={step} chField={chat.field} chSendField={chSendField} typingField={typing.field} turno={turnoOf('field')} onSendDoc={sendDoc} sentDocs={sentDocs}/>}
        {tab==='deere'&&<VDeere log={chat.customer} flags={flags} step={step} typing={typing.customer} chDealer={chat.dealer} chField={chat.field} sendDealer={sendDealer} sendField={sendField} typingDealer={typing.dealer} typingField={typing.field}/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
